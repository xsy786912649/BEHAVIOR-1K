name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  bddl_tests:
    name: BDDL Tests
    runs-on: [self-hosted, linux, gpu]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install BDDL
        run: pip install -e .
        working-directory: ${{ github.workspace }}/bddl3

      - name: Run BDDL tests
        run: pytest tests/test_knowledgebase.py -v --junitxml=bddl_tests.xml -o junit_family=xunit1
        working-directory: ${{ github.workspace }}/bddl3

      - name: Deploy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_id }}-tests-bddl
          path: bddl3/bddl_tests.xml
          overwrite: true

  check_example_list:
    name: Check Example List Up To Date
    runs-on: [self-hosted, linux, gpu]
    defaults:
      run:
        working-directory: ${{ github.workspace }}/OmniGibson

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install BDDL
        run: pip install -e .
        working-directory: ${{ github.workspace }}/bddl3

      - name: Install OmniGibson
        run: pip install -e .[dev,primitives,eval] --no-build-isolation
      - name: Check example lists are up to date
        run: python tests/update_example_tests.py --check

  run_test:
    name: Run Tests
    runs-on: [self-hosted, linux, gpu, dataset-enabled]

    strategy:
      fail-fast: false
      matrix:
        test_file:
          - test_controllers
          # - test_curobo
          # - test_data_collection  # TODO: https://github.com/StanfordVL/BEHAVIOR-1K/issues/2016
          - test_dump_load_states
          - test_envs
          - test_multiple_envs
          - test_object_removal
          - test_object_states
          # - test_primitives
          - test_robot_states_flatcache
          - test_robot_teleoperation
          - test_scene_graph
          - test_sensors
          - test_symbolic_primitives
          - test_systems
          - test_transform_utils
          - test_snapshots
          - test_transition_rules
        include:
        # --- BEGIN AUTO-GENERATED EXAMPLE INCLUDES ---
          - {test_file: test_examples, example: "environments.navigation_env_demo"}
          - {test_file: test_examples, example: "environments.vector_env_demo"}
          - {test_file: test_examples, example: "object_states.attachment_demo"}
          - {test_file: test_examples, example: "object_states.dicing_demo"}
          - {test_file: test_examples, example: "object_states.folded_unfolded_state_demo"}
          - {test_file: test_examples, example: "object_states.heat_source_or_sink_demo"}
          - {test_file: test_examples, example: "object_states.heated_state_demo"}
          - {test_file: test_examples, example: "object_states.onfire_demo"}
          - {test_file: test_examples, example: "object_states.overlaid_demo"}
          - {test_file: test_examples, example: "object_states.particle_applier_remover_demo"}
          - {test_file: test_examples, example: "object_states.particle_source_sink_demo"}
          - {test_file: test_examples, example: "object_states.sample_kinematics_demo"}
          - {test_file: test_examples, example: "object_states.slicing_demo"}
          - {test_file: test_examples, example: "object_states.temperature_demo"}
          - {test_file: test_examples, example: "objects.draw_bounding_box"}
          - {test_file: test_examples, example: "objects.highlight_objects"}
          - {test_file: test_examples, example: "objects.load_object_selector"}
          - {test_file: test_examples, example: "objects.view_cloth_configurations"}
          - {test_file: test_examples, example: "objects.visualize_object"}
          - {test_file: test_examples, example: "robots.all_robots_visualizer"}
          - {test_file: test_examples, example: "robots.grasping_mode_example"}
          - {test_file: test_examples, example: "robots.import_custom_robot", args: "--config tests/data/r1_pro_source_config.yaml"}
          - {test_file: test_examples, example: "robots.robot_control_example"}
          - {test_file: test_examples, example: "scenes.scene_selector"}
          - {test_file: test_examples, example: "scenes.scene_tour_demo"}
          - {test_file: test_examples, example: "scenes.traversability_map_example"}
          - {test_file: test_examples, example: "simulator.sim_save_load_example"}
        # --- END AUTO-GENERATED EXAMPLE INCLUDES ---

    defaults:
      run:
        working-directory: ${{ github.workspace }}/OmniGibson

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install BDDL
        run: pip install -e .
        working-directory: ${{ github.workspace }}/bddl3

      - name: Install OmniGibson
        run: pip install -e .[dev,primitives,eval] --no-build-isolation

      - name: Print env
        run: printenv

      - name: Run tests
        run: >
          pytest -s tests/${{ matrix.test_file }}.py
          ${{ matrix.example && format('-k "{0}"', matrix.example) || '' }}
          ${{ matrix.args && format('--test-args={0}', matrix.args) || '' }}
          --junitxml=${{ matrix.test_file }}${{ matrix.example && format('_{0}', matrix.example) || '' }}.xml
          -o junit_family=xunit1
        continue-on-error: true
        timeout-minutes: 30

      - name: Check for failures, errors, or missing XML
        if: always()
        run: |
          xml=${{ matrix.test_file }}${{ matrix.example && format('_{0}', matrix.example) || '' }}.xml
          if [ ! -f "$xml" ]; then
            cat > "$xml" << 'EOF'
          <?xml version="1.0"?>
          <testsuite name="${{ matrix.test_file }}" errors="1" failures="0" tests="1">
            <testcase name="${{ matrix.test_file }}" classname="${{ matrix.test_file }}">
              <error message="Test did not produce output, likely due to segfault or timeout"/>
            </testcase>
          </testsuite>
          EOF
            echo "Error: XML file not found, probably due to segfault or timeout"
            exit 1
          elif grep -Eq 'failures="[1-9][0-9]*"|errors="[1-9][0-9]*"' "$xml"; then
            echo "Error: Test failures or errors found"
            exit 1
          else
            echo "All tests passed successfully"
          fi

      - name: Deploy snapshot artifacts
        if: always() && matrix.test_file == 'test_snapshots'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_id }}-snapshots
          path: OmniGibson/tests/snapshots/actual/
          overwrite: true

      - name: Deploy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_id }}-tests-${{ matrix.test_file }}${{ matrix.example && format('-{0}', matrix.example) || '' }}
          path: OmniGibson/${{ matrix.test_file }}${{ matrix.example && format('_{0}', matrix.example) || '' }}.xml
          overwrite: true

  upload_report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [bddl_tests, check_example_list, run_test]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Pull reports
        uses: actions/download-artifact@v4
        with:
          path: test-results
          merge-multiple: true
      - name: Upload test results to Trunk
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: test-results/**/*.xml
          org-slug: stanfordvl-behavior
          token: ${{ secrets.TRUNK_API_TOKEN }}

      - name: Convert JUnit XML to CTRF
        run: npx --yes junit-to-ctrf "test-results/**/test_*.xml" -o ctrf-report.json

      - name: Publish PR comment
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: ctrf-report.json
          pull-request-report: true
          overwrite-comment: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if any tests failed
        run: |
          if grep -rqE 'failures="[1-9][0-9]*"|errors="[1-9][0-9]*"' test-results/; then
            echo "Test failures or errors found"
            exit 1
          fi

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v2.1.0
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
